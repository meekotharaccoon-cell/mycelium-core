name: Daily Orchestrate

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  orchestrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run orchestrator
        env:
          GH_TOKEN: ${{ secrets.MYCELIUM_PAT }}
        run: python agent/orchestrator.py

      - name: Run spore dispatcher
        env:
          GH_TOKEN: ${{ secrets.MYCELIUM_PAT }}
        run: python agent/spore_dispatcher.py

      - name: Commit health report
        run: |
          git config user.name "mycelium-core[bot]"
          git config user.email "bot@meeko-mycelium.org"
          git add data/
          git diff --cached --quiet || git commit -m "chore: organism health report [automated]"
          git push
